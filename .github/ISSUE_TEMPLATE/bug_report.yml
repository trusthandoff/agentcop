name: Bug Report
description: Something is broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much
        detail as possible — it helps us fix it faster.

  - type: input
    id: version
    attributes:
      label: agentcop version
      description: "`python -c 'import agentcop; print(agentcop.__version__)'`"
      placeholder: "0.2.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.1"
    validations:
      required: true

  - type: dropdown
    id: adapter
    attributes:
      label: Adapter (if applicable)
      options:
        - "N/A — core library"
        - langgraph
        - langsmith
        - langfuse
        - datadog
        - haystack
        - semantic-kernel
        - llamaindex
        - crewai
        - autogen
        - otel
        - other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproducible example
      description: >
        The smallest piece of code that demonstrates the problem.
        Remove everything that isn't needed to trigger the bug.
      render: python
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Full traceback (if applicable)
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be relevant.
